name: sydneytrips

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: sydneytrips-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: trips
      POSTGRES_PASSWORD: trips
      POSTGRES_DB: trips
    ports:
      # Host port 5433 to avoid clashing with a native Homebrew/Postgres install on 5432.
      # Container still listens on 5432 internally.
      - "5433:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trips -d trips"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sydneytrips-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Self-hosted routing engine for the *planning* travel-time matrix (free-flow driving durations).
  # This is what takes the project's dominant external cost — Google's per-element Route Matrix — to
  # ~zero marginal cost. Opt-in via the "routing" profile so a plain `docker compose up` doesn't try
  # to start it before the map data exists:
  #
  #   docker compose -f infra/docker-compose.yml --profile routing up -d osrm
  #
  # One-time data prep (run from infra/, fills ./osrm with region.osrm*). Pick the smallest extract
  # that covers your trips — the NSW clip (~250 MB) covers Sydney and beats the whole continent
  # (~900 MB) for build time and RAM. The --platform flag is required on Apple Silicon (arm64);
  # drop it on a native amd64 host.
  #
  #   mkdir -p osrm && cd osrm
  #   curl -L -o region.osm.pbf https://download.geofabrik.de/australia-oceania/australia/new-south-wales-latest.osm.pbf
  #   IMG=ghcr.io/project-osrm/osrm-backend:latest
  #   docker run --rm --platform linux/amd64 -v "$PWD:/data" $IMG osrm-extract   -p /opt/car.lua /data/region.osm.pbf
  #   docker run --rm --platform linux/amd64 -v "$PWD:/data" $IMG osrm-partition  /data/region.osrm
  #   docker run --rm --platform linux/amd64 -v "$PWD:/data" $IMG osrm-customize  /data/region.osrm
  #
  # Then point the API at it:  Integrations:Osrm:BaseUrl = http://localhost:5001
  osrm:
    image: ghcr.io/project-osrm/osrm-backend:latest
    # The osrm-backend image is published linux/amd64 only; on Apple Silicon (arm64) Docker
    # Desktop runs it under emulation. The same flag is needed for the one-time build steps above
    # (docker run --platform linux/amd64 …). Harmless on native amd64 hosts.
    platform: linux/amd64
    container_name: sydneytrips-osrm
    profiles: ["routing"]
    restart: unless-stopped
    # --max-table-size must exceed the largest origins+destinations a single /table call sends;
    # 2000 comfortably covers any realistic trip's node-set.
    command: osrm-routed --algorithm mld --max-table-size 2000 /data/region.osrm
    ports:
      # Host 5001 (the API owns 5000); OSRM listens on 5000 inside the container.
      - "5001:5000"
    volumes:
      - ./osrm:/data

volumes:
  pg-data:
  redis-data:
