<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect width="1440" height="900" fill="#f8fafc"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="240" height="900" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="32" y="48" font-size="18" font-weight="600" fill="#0f172a">SydneyTrips</text>
  <text x="46" y="98" font-size="14" fill="#475569">▤ Trips</text>
  <text x="46" y="138" font-size="14" fill="#475569">＋ Create trip</text>

  <!-- Content area -->
  <g transform="translate(280 60)">
    <!-- Header -->
    <text x="0" y="20" font-size="13" fill="#64748b">⟵ Trip overview</text>
    <text x="0" y="60" font-size="24" font-weight="600" fill="#0f172a">Cost split</text>
    <text x="0" y="84" font-size="13" fill="#64748b">Fair fuel + tolls, attributed by passenger-kilometres carried.</text>

    <!-- Inputs card -->
    <rect x="0" y="110" width="780" height="160" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="20" y="138" font-size="13" font-weight="600" fill="#0f172a" letter-spacing="0.04em">INPUTS</text>

    <g font-size="11" fill="#475569">
      <text x="20" y="166">Fuel price</text>
      <rect x="20" y="174" width="180" height="36" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
      <text x="36" y="196" font-size="13" fill="#0f172a">$2.05 / L</text>

      <text x="220" y="166">Fuel economy</text>
      <rect x="220" y="174" width="180" height="36" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
      <text x="236" y="196" font-size="13" fill="#0f172a">8.4 L / 100 km</text>

      <text x="420" y="166">Tolls</text>
      <rect x="420" y="174" width="340" height="36" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
      <text x="436" y="196" font-size="13" fill="#0f172a">Eastern Distributor ($6.85) · Mosman Tunnel ($4.20)</text>
    </g>

    <text x="20" y="240" font-size="11" fill="#64748b">Defaults pulled from the trip; overrides re-compute on save. Tolls can be set per segment.</text>
    <rect x="660" y="222" width="100" height="32" rx="6" fill="#0f172a"/>
    <text x="710" y="242" text-anchor="middle" font-size="12" font-weight="500" fill="#ffffff">Save</text>

    <!-- Headline cost card -->
    <rect x="0" y="290" width="780" height="120" rx="12" fill="#0f172a"/>
    <text x="32" y="320" font-size="11" font-weight="500" fill="#cbd5e1" letter-spacing="0.06em">TOTAL TRIP COST</text>
    <text x="32" y="364" font-size="36" font-weight="700" fill="#ffffff">$93.40</text>
    <text x="32" y="386" font-size="12" fill="#94a3b8">86.4 km · 7.3 L · 3 drivers · 11 participants</text>

    <text x="572" y="320" text-anchor="end" font-size="11" font-weight="500" fill="#cbd5e1" letter-spacing="0.06em">FUEL</text>
    <text x="572" y="358" text-anchor="end" font-size="22" font-weight="600" fill="#ffffff">$82.35</text>

    <text x="748" y="320" text-anchor="end" font-size="11" font-weight="500" fill="#cbd5e1" letter-spacing="0.06em">TOLLS</text>
    <text x="748" y="358" text-anchor="end" font-size="22" font-weight="600" fill="#ffffff">$11.05</text>

    <!-- Breakdown table -->
    <rect x="0" y="430" width="780" height="380" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="20" y="458" font-size="13" font-weight="600" fill="#0f172a" letter-spacing="0.04em">PER-PERSON SHARE</text>

    <!-- Table header -->
    <line x1="20" y1="478" x2="760" y2="478" stroke="#e2e8f0"/>
    <g font-size="11" font-weight="500" fill="#64748b" letter-spacing="0.04em">
      <text x="20" y="498">PARTICIPANT</text>
      <text x="260" y="498">CARRIED FROM</text>
      <text x="480" y="498" text-anchor="end">PAX-KM</text>
      <text x="600" y="498" text-anchor="end">FUEL</text>
      <text x="680" y="498" text-anchor="end">TOLLS</text>
      <text x="760" y="498" text-anchor="end">TOTAL</text>
    </g>
    <line x1="20" y1="508" x2="760" y2="508" stroke="#e2e8f0"/>

    <!-- Driver rows -->
    <g font-size="12" fill="#0f172a" font-family="ui-monospace, 'SF Mono', monospace">
      <text x="20" y="532">Alex (driver)</text>
      <text x="260" y="532" font-family="system-ui" fill="#64748b">Bondi → Palm Beach</text>
      <text x="480" y="532" text-anchor="end">14.2</text>
      <text x="600" y="532" text-anchor="end">$11.40</text>
      <text x="680" y="532" text-anchor="end">$2.05</text>
      <text x="760" y="532" text-anchor="end" font-weight="600">$13.45</text>

      <text x="20" y="556">Bianca (driver)</text>
      <text x="260" y="556" font-family="system-ui" fill="#64748b">Chatswood → Palm Beach</text>
      <text x="480" y="556" text-anchor="end">12.6</text>
      <text x="600" y="556" text-anchor="end">$10.10</text>
      <text x="680" y="556" text-anchor="end">$1.05</text>
      <text x="760" y="556" text-anchor="end" font-weight="600">$11.15</text>

      <text x="20" y="580">Cameron (driver)</text>
      <text x="260" y="580" font-family="system-ui" fill="#64748b">Newtown → Palm Beach</text>
      <text x="480" y="580" text-anchor="end">9.4</text>
      <text x="600" y="580" text-anchor="end">$7.50</text>
      <text x="680" y="580" text-anchor="end">$0.00</text>
      <text x="760" y="580" text-anchor="end" font-weight="600">$7.50</text>
    </g>
    <line x1="20" y1="592" x2="760" y2="592" stroke="#e2e8f0"/>

    <!-- Passenger rows -->
    <g font-size="12" fill="#0f172a" font-family="ui-monospace, 'SF Mono', monospace">
      <text x="20" y="616">Eli</text>
      <text x="260" y="616" font-family="system-ui" fill="#64748b">Coogee  →  Palm Beach (Alex)</text>
      <text x="480" y="616" text-anchor="end">12.6</text>
      <text x="600" y="616" text-anchor="end">$10.10</text>
      <text x="680" y="616" text-anchor="end">$1.82</text>
      <text x="760" y="616" text-anchor="end" font-weight="600">$11.92</text>

      <text x="20" y="640">Fiona</text>
      <text x="260" y="640" font-family="system-ui" fill="#64748b">Manly  →  Palm Beach (Alex)</text>
      <text x="480" y="640" text-anchor="end">9.8</text>
      <text x="600" y="640" text-anchor="end">$7.85</text>
      <text x="680" y="640" text-anchor="end">$1.42</text>
      <text x="760" y="640" text-anchor="end" font-weight="600">$9.27</text>

      <text x="20" y="664">Gus</text>
      <text x="260" y="664" font-family="system-ui" fill="#64748b">Mosman  →  Palm Beach (Alex)</text>
      <text x="480" y="664" text-anchor="end">8.1</text>
      <text x="600" y="664" text-anchor="end">$6.50</text>
      <text x="680" y="664" text-anchor="end">$1.18</text>
      <text x="760" y="664" text-anchor="end" font-weight="600">$7.68</text>

      <text x="20" y="688">Hana</text>
      <text x="260" y="688" font-family="system-ui" fill="#64748b">Surry Hills  →  Palm Beach (Bianca)</text>
      <text x="480" y="688" text-anchor="end">11.4</text>
      <text x="600" y="688" text-anchor="end">$9.15</text>
      <text x="680" y="688" text-anchor="end">$0.95</text>
      <text x="760" y="688" text-anchor="end" font-weight="600">$10.10</text>

      <text x="20" y="712">Ivy</text>
      <text x="260" y="712" font-family="system-ui" fill="#64748b">Glebe  →  Palm Beach (Bianca)</text>
      <text x="480" y="712" text-anchor="end">10.7</text>
      <text x="600" y="712" text-anchor="end">$8.60</text>
      <text x="680" y="712" text-anchor="end">$0.89</text>
      <text x="760" y="712" text-anchor="end" font-weight="600">$9.49</text>

      <text x="20" y="736">Jaz</text>
      <text x="260" y="736" font-family="system-ui" fill="#64748b">Marrickville  →  Palm Beach (Cameron)</text>
      <text x="480" y="736" text-anchor="end">8.6</text>
      <text x="600" y="736" text-anchor="end">$6.90</text>
      <text x="680" y="736" text-anchor="end">$0.00</text>
      <text x="760" y="736" text-anchor="end" font-weight="600">$6.90</text>

      <text x="20" y="760">Kai</text>
      <text x="260" y="760" font-family="system-ui" fill="#64748b">Rockdale  →  Palm Beach (Cameron)</text>
      <text x="480" y="760" text-anchor="end">7.2</text>
      <text x="600" y="760" text-anchor="end">$5.80</text>
      <text x="680" y="760" text-anchor="end">$0.00</text>
      <text x="760" y="760" text-anchor="end" font-weight="600">$5.80</text>

      <text x="20" y="784">Leo</text>
      <text x="260" y="784" font-family="system-ui" fill="#64748b">Strathfield  →  Palm Beach (Cameron)</text>
      <text x="480" y="784" text-anchor="end">5.7</text>
      <text x="600" y="784" text-anchor="end">$4.60</text>
      <text x="680" y="784" text-anchor="end">$0.00</text>
      <text x="760" y="784" text-anchor="end" font-weight="600">$4.60</text>
    </g>

    <!-- Sidecar -->
    <text x="800" y="138" font-size="13" font-weight="600" fill="#0f172a" letter-spacing="0.04em">HOW IT'S COMPUTED</text>
    <g font-size="12" fill="#475569">
      <text x="800" y="166">Each metre of driver travel is</text>
      <text x="800" y="184">attributed to whichever passengers</text>
      <text x="800" y="202">were being carried at that moment.</text>
      <text x="800" y="220">Drivers also pay for the legs where</text>
      <text x="800" y="238">only they are in the car.</text>
      <text x="800" y="270">Tolls are split the same way, then</text>
      <text x="800" y="288">attributed per-segment.</text>
      <text x="800" y="320">Property-based tests check that</text>
      <text x="800" y="338">the sum of shares equals the total</text>
      <text x="800" y="356">for any random instance.</text>
    </g>

    <!-- Export buttons -->
    <rect x="800" y="430" width="200" height="40" rx="8" fill="#0f172a"/>
    <text x="900" y="455" text-anchor="middle" font-size="13" font-weight="500" fill="#ffffff">Email everyone their share</text>

    <rect x="800" y="478" width="200" height="40" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="900" y="503" text-anchor="middle" font-size="13" fill="#0f172a">Download .csv</text>

    <rect x="800" y="526" width="200" height="40" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="900" y="551" text-anchor="middle" font-size="13" fill="#0f172a">Add to calendar (.ics)</text>
  </g>

  <text x="280" y="888" font-size="11" fill="#64748b">Mockup — see docs/screenshots/README.md.  Numbers come from the cost-split service; UI rendering blocked on trip-detail API shape.</text>
</svg>
