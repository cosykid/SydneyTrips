<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect width="1440" height="900" fill="#0f172a" opacity="0.35"/>
  <!-- Dimmed planner backdrop hint -->
  <rect x="0" y="0" width="1440" height="900" fill="#e2e8f0" opacity="0.15"/>

  <!-- Modal -->
  <rect x="180" y="80" width="1080" height="740" rx="16" fill="#ffffff" stroke="#cbd5e1"/>

  <!-- Header -->
  <text x="210" y="120" font-size="20" font-weight="600" fill="#0f172a">What if…</text>
  <text x="210" y="142" font-size="12" fill="#64748b">Re-solves from the locked baseline as a CP-SAT hint, so the solver doesn't start from scratch.</text>

  <!-- Close x -->
  <text x="1230" y="120" text-anchor="end" font-size="20" fill="#94a3b8">✕</text>

  <line x1="180" y1="158" x2="1260" y2="158" stroke="#e2e8f0"/>

  <!-- Left: scenario inputs -->
  <text x="210" y="190" font-size="13" font-weight="600" fill="#0f172a" letter-spacing="0.05em">SCENARIO</text>

  <text x="210" y="222" font-size="12" fill="#475569">Drop participants:</text>
  <rect x="210" y="232" width="320" height="64" rx="10" fill="#fef2f2" stroke="#fecaca"/>
  <text x="230" y="256" font-size="13" font-weight="600" fill="#0f172a">✕  Hana (Surry Hills)</text>
  <text x="230" y="276" font-size="11" fill="#64748b">currently riding with Bianca · stop 2</text>
  <text x="230" y="290" font-size="13" font-weight="600" fill="#0f172a">✕  Leo (Strathfield)</text>

  <text x="210" y="328" font-size="12" fill="#475569">Add a participant:</text>
  <rect x="210" y="338" width="320" height="36" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-dasharray="3 3"/>
  <text x="370" y="360" text-anchor="middle" font-size="11" fill="#94a3b8">＋ paste an address...</text>

  <text x="210" y="404" font-size="12" fill="#475569">Re-weight (optional):</text>
  <g font-size="11" fill="#475569">
    <text x="210" y="426">drive  </text>
    <text x="530" y="426" text-anchor="end" fill="#0f172a">1.0 (same)</text>
    <text x="210" y="448">stops  </text>
    <text x="530" y="448" text-anchor="end" fill="#0f172a">0.5 (same)</text>
    <text x="210" y="470">walk + PT  </text>
    <text x="530" y="470" text-anchor="end" fill="#0f172a">0.5 (same)</text>
    <text x="210" y="492">spread  </text>
    <text x="530" y="492" text-anchor="end" fill="#0f172a">0.3 (same)</text>
    <text x="210" y="514">fairness  </text>
    <text x="530" y="514" text-anchor="end" fill="#0f172a">0.3 (same)</text>
  </g>

  <!-- Solve button -->
  <rect x="210" y="544" width="320" height="40" rx="8" fill="#0f172a"/>
  <text x="370" y="569" text-anchor="middle" font-size="13" font-weight="500" fill="#ffffff">Re-solve from locked hint</text>

  <text x="210" y="610" font-size="11" font-weight="600" fill="#0f172a" letter-spacing="0.06em">SOLVER STATS</text>
  <g font-size="11" fill="#64748b" font-family="ui-monospace, monospace">
    <text x="210" y="632">solver</text>
    <text x="350" y="632" fill="#0f172a">OR-Tools CP-SAT</text>
    <text x="210" y="650">wallclock</text>
    <text x="350" y="650" fill="#0f172a">2,143 ms</text>
    <text x="210" y="668">status</text>
    <text x="350" y="668" fill="#0f172a">Feasible (hint accepted)</text>
    <text x="210" y="686">branches</text>
    <text x="350" y="686" fill="#0f172a">11,420</text>
    <text x="210" y="704">improving moves</text>
    <text x="350" y="704" fill="#0f172a">3</text>
  </g>

  <!-- Vertical divider -->
  <line x1="566" y1="180" x2="566" y2="780" stroke="#e2e8f0"/>

  <!-- Right: diff view -->
  <text x="596" y="190" font-size="13" font-weight="600" fill="#0f172a" letter-spacing="0.05em">DIFF</text>

  <!-- Headline -->
  <rect x="596" y="206" width="640" height="80" rx="10" fill="#ecfdf5" stroke="#86efac"/>
  <text x="620" y="232" font-size="12" font-weight="600" fill="#166534" letter-spacing="0.06em">OBJECTIVE</text>
  <text x="620" y="266" font-size="22" font-weight="700" fill="#0f172a">298.4  →  247.8</text>
  <text x="780" y="266" font-size="14" font-weight="600" fill="#16a34a">↓ 16.9%</text>

  <text x="1216" y="232" text-anchor="end" font-size="12" font-weight="600" fill="#166534" letter-spacing="0.06em">DRIVE</text>
  <text x="1216" y="266" text-anchor="end" font-size="18" font-weight="600" fill="#0f172a">231 → 198 min</text>

  <!-- Term-by-term -->
  <text x="596" y="316" font-size="11" font-weight="600" fill="#0f172a" letter-spacing="0.06em">OBJECTIVE TERMS</text>
  <g font-size="12" font-family="ui-monospace, monospace">
    <text x="596" y="340">drive</text>
    <text x="850" y="340" text-anchor="end" fill="#64748b">231.4</text>
    <text x="900" y="340" fill="#94a3b8">→</text>
    <text x="980" y="340" text-anchor="end" fill="#0f172a">198.1</text>
    <text x="1080" y="340" text-anchor="end" fill="#16a34a">−33.3 (−14%)</text>

    <text x="596" y="362">stops</text>
    <text x="850" y="362" text-anchor="end" fill="#64748b">8.0</text>
    <text x="900" y="362" fill="#94a3b8">→</text>
    <text x="980" y="362" text-anchor="end" fill="#0f172a">6.0</text>
    <text x="1080" y="362" text-anchor="end" fill="#16a34a">−2.0 (−25%)</text>

    <text x="596" y="384">walk + PT</text>
    <text x="850" y="384" text-anchor="end" fill="#64748b">12.3</text>
    <text x="900" y="384" fill="#94a3b8">→</text>
    <text x="980" y="384" text-anchor="end" fill="#0f172a">12.3</text>
    <text x="1080" y="384" text-anchor="end" fill="#94a3b8">0.0</text>

    <text x="596" y="406">spread</text>
    <text x="850" y="406" text-anchor="end" fill="#64748b">22.7</text>
    <text x="900" y="406" fill="#94a3b8">→</text>
    <text x="980" y="406" text-anchor="end" fill="#0f172a">19.2</text>
    <text x="1080" y="406" text-anchor="end" fill="#16a34a">−3.5</text>

    <text x="596" y="428">fairness</text>
    <text x="850" y="428" text-anchor="end" fill="#64748b">23.6</text>
    <text x="900" y="428" fill="#94a3b8">→</text>
    <text x="980" y="428" text-anchor="end" fill="#0f172a">11.4</text>
    <text x="1080" y="428" text-anchor="end" fill="#16a34a">−12.2</text>
  </g>

  <!-- Removed stops -->
  <text x="596" y="476" font-size="11" font-weight="600" fill="#0f172a" letter-spacing="0.06em">REMOVED STOPS</text>
  <rect x="596" y="490" width="640" height="34" rx="6" fill="#fef2f2" stroke="#fecaca"/>
  <text x="616" y="512" font-size="12" fill="#0f172a">−  Stop 2 of Bianca's route (Hana, Surry Hills)</text>

  <rect x="596" y="528" width="640" height="34" rx="6" fill="#fef2f2" stroke="#fecaca"/>
  <text x="616" y="550" font-size="12" fill="#0f172a">−  Stop 3 of Cameron's route (Leo, Strathfield)</text>

  <!-- Re-routed -->
  <text x="596" y="600" font-size="11" font-weight="600" fill="#0f172a" letter-spacing="0.06em">RE-ROUTED</text>
  <rect x="596" y="614" width="640" height="34" rx="6" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="616" y="636" font-size="12" fill="#0f172a">~  Bianca: Chatswood → Glebe → Manly → Palm Beach (was via Surry Hills)</text>

  <!-- Lock the new solution -->
  <rect x="596" y="700" width="320" height="40" rx="8" fill="#0f172a"/>
  <text x="756" y="725" text-anchor="middle" font-size="13" font-weight="500" fill="#ffffff">🔒 Lock the candidate</text>

  <rect x="930" y="700" width="306" height="40" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="1083" y="725" text-anchor="middle" font-size="13" fill="#0f172a">Discard</text>

  <text x="596" y="764" font-size="11" fill="#64748b">Locking the candidate replaces the current locked solution and fires TripEvent.SolutionLocked. Drivers/passengers see new ETAs in &lt; 1 s via SignalR.</text>

  <!-- Annotation -->
  <text x="180" y="876" font-size="11" fill="#cbd5e1">Mockup — see docs/screenshots/README.md.  The what-if API endpoint is implemented; only the modal UI binding needs alignment.</text>
</svg>
