<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="map" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#cfe6ff"/>
      <stop offset="1" stop-color="#e7f5e7"/>
    </linearGradient>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f172a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1440" height="900" fill="url(#bg)"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="240" height="900" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="32" y="48" font-size="18" font-weight="600" fill="#0f172a">SydneyTrips</text>
  <rect x="16" y="74" width="208" height="36" rx="8" fill="#0f172a"/>
  <text x="46" y="98" font-size="14" font-weight="500" fill="#ffffff">▤ Trips</text>
  <text x="46" y="138" font-size="14" fill="#475569">＋ Create trip</text>
  <text x="32" y="184" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="0.08em">COMING SOON</text>
  <text x="46" y="216" font-size="14" fill="#94a3b8">⌬ Profile</text>
  <text x="32" y="836" font-size="13" font-weight="600" fill="#0f172a">Demo Organiser</text>
  <text x="32" y="856" font-size="12" fill="#64748b">demo@sydneytrips.dev</text>

  <!-- Main: map area + side panel -->
  <!-- Map background -->
  <rect x="240" y="0" width="900" height="900" fill="url(#map)"/>

  <!-- Faux Sydney coastline path (Bondi/Manly hint) -->
  <path d="M 240 600 Q 380 540 540 580 T 800 540 T 1080 480 L 1140 320 L 1140 900 L 240 900 Z" fill="#dceedb" opacity="0.6"/>
  <path d="M 1020 280 Q 1080 220 1140 200" stroke="#86b4ff" stroke-width="2" fill="none" opacity="0.4"/>

  <!-- Destination pin (Palm Beach, top) -->
  <circle cx="1080" cy="180" r="14" fill="#dc2626" stroke="#ffffff" stroke-width="3"/>
  <text x="1080" y="186" text-anchor="middle" font-size="14" fill="#ffffff" font-weight="700">⚐</text>
  <rect x="1010" y="210" width="170" height="36" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="1095" y="232" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">Palm Beach NSW</text>

  <!-- Driver markers (3 distinct colours) -->
  <!-- D0 - Bondi -->
  <circle cx="900" cy="560" r="11" fill="#2563eb" stroke="#ffffff" stroke-width="2.5"/>
  <text x="900" y="564" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">D0</text>
  <!-- D1 - Chatswood -->
  <circle cx="820" cy="430" r="11" fill="#7c3aed" stroke="#ffffff" stroke-width="2.5"/>
  <text x="820" y="434" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">D1</text>
  <!-- D2 - Newtown -->
  <circle cx="640" cy="560" r="11" fill="#059669" stroke="#ffffff" stroke-width="2.5"/>
  <text x="640" y="564" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">D2</text>

  <!-- Passenger markers (smaller circles) -->
  <circle cx="930" cy="600" r="6" fill="#fff" stroke="#2563eb" stroke-width="2.5"/>
  <circle cx="950" cy="500" r="6" fill="#fff" stroke="#2563eb" stroke-width="2.5"/>
  <circle cx="780" cy="380" r="6" fill="#fff" stroke="#7c3aed" stroke-width="2.5"/>
  <circle cx="700" cy="450" r="6" fill="#fff" stroke="#7c3aed" stroke-width="2.5"/>
  <circle cx="600" cy="520" r="6" fill="#fff" stroke="#7c3aed" stroke-width="2.5"/>
  <circle cx="680" cy="620" r="6" fill="#fff" stroke="#059669" stroke-width="2.5"/>
  <circle cx="540" cy="600" r="6" fill="#fff" stroke="#059669" stroke-width="2.5"/>
  <circle cx="580" cy="660" r="6" fill="#fff" stroke="#059669" stroke-width="2.5"/>

  <!-- PT pickup candidate (square = station) -->
  <rect x="556" y="556" width="12" height="12" fill="#f59e0b" stroke="#ffffff" stroke-width="2"/>
  <rect x="710" y="410" width="12" height="12" fill="#f59e0b" stroke="#ffffff" stroke-width="2"/>

  <!-- Route polylines (driver 0) -->
  <path d="M 900 560 L 930 600 L 950 500 L 1080 180" stroke="#2563eb" stroke-width="3" fill="none" opacity="0.7" marker-end="url(#arrowhead)"/>
  <!-- Route polylines (driver 1) -->
  <path d="M 820 430 L 780 380 L 716 416 L 700 450 L 1080 180" stroke="#7c3aed" stroke-width="3" fill="none" opacity="0.7" marker-end="url(#arrowhead)"/>
  <!-- Route polylines (driver 2) -->
  <path d="M 640 560 L 562 562 L 540 600 L 580 660 L 680 620 L 1080 180" stroke="#059669" stroke-width="3" fill="none" opacity="0.7" marker-end="url(#arrowhead)"/>

  <!-- Top-left chip -->
  <rect x="260" y="20" width="280" height="34" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="278" y="42" font-size="13" fill="#0f172a">⟵ Group trip to Palm Beach</text>

  <!-- Top-right Mapbox attribution -->
  <text x="1130" y="876" text-anchor="end" font-size="10" fill="#64748b" opacity="0.7">© Mapbox · © OpenStreetMap</text>

  <!-- Right side panel -->
  <rect x="1140" y="0" width="300" height="900" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="1160" y="40" font-size="15" font-weight="600" fill="#0f172a">Planner</text>
  <text x="1160" y="62" font-size="11" fill="#64748b">11 participants · 24 candidate nodes</text>

  <!-- Optimise button -->
  <rect x="1160" y="80" width="260" height="40" rx="8" fill="#0f172a"/>
  <text x="1290" y="105" text-anchor="middle" font-size="13" font-weight="500" fill="#ffffff">Optimise</text>

  <!-- Weight sliders header -->
  <text x="1160" y="160" font-size="12" font-weight="600" fill="#0f172a" letter-spacing="0.05em">OBJECTIVE WEIGHTS</text>

  <!-- 5 slider rows -->
  <g font-size="11" fill="#475569">
    <text x="1160" y="190">Drive time</text>
    <text x="1420" y="190" text-anchor="end" fill="#0f172a">1.0</text>
    <rect x="1160" y="196" width="260" height="6" rx="3" fill="#e2e8f0"/>
    <rect x="1160" y="196" width="260" height="6" rx="3" fill="#0f172a"/>
    <circle cx="1420" cy="199" r="7" fill="#0f172a"/>

    <text x="1160" y="232">Stop count</text>
    <text x="1420" y="232" text-anchor="end" fill="#0f172a">0.5</text>
    <rect x="1160" y="238" width="260" height="6" rx="3" fill="#e2e8f0"/>
    <rect x="1160" y="238" width="130" height="6" rx="3" fill="#0f172a"/>
    <circle cx="1290" cy="241" r="7" fill="#0f172a"/>

    <text x="1160" y="274">Walk + PT</text>
    <text x="1420" y="274" text-anchor="end" fill="#0f172a">0.5</text>
    <rect x="1160" y="280" width="260" height="6" rx="3" fill="#e2e8f0"/>
    <rect x="1160" y="280" width="130" height="6" rx="3" fill="#0f172a"/>
    <circle cx="1290" cy="283" r="7" fill="#0f172a"/>

    <text x="1160" y="316">Arrival spread</text>
    <text x="1420" y="316" text-anchor="end" fill="#0f172a">0.3</text>
    <rect x="1160" y="322" width="260" height="6" rx="3" fill="#e2e8f0"/>
    <rect x="1160" y="322" width="78" height="6" rx="3" fill="#0f172a"/>
    <circle cx="1238" cy="325" r="7" fill="#0f172a"/>

    <text x="1160" y="358">Fairness</text>
    <text x="1420" y="358" text-anchor="end" fill="#0f172a">0.3</text>
    <rect x="1160" y="364" width="260" height="6" rx="3" fill="#e2e8f0"/>
    <rect x="1160" y="364" width="78" height="6" rx="3" fill="#0f172a"/>
    <circle cx="1238" cy="367" r="7" fill="#0f172a"/>
  </g>

  <!-- Pareto carousel -->
  <text x="1160" y="416" font-size="12" font-weight="600" fill="#0f172a" letter-spacing="0.05em">PARETO SOLUTIONS</text>

  <!-- Three solution cards -->
  <g>
    <rect x="1160" y="430" width="80" height="100" rx="8" fill="#0f172a" stroke="#0f172a"/>
    <text x="1200" y="450" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Balanced</text>
    <text x="1200" y="478" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">298</text>
    <text x="1200" y="494" text-anchor="middle" font-size="9" fill="#cbd5e1" opacity="0.85">obj</text>
    <text x="1200" y="514" text-anchor="middle" font-size="9" fill="#cbd5e1">3 drivers · 8 stops</text>

    <rect x="1250" y="430" width="80" height="100" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="1290" y="450" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">Fewest stops</text>
    <text x="1290" y="478" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">312</text>
    <text x="1290" y="494" text-anchor="middle" font-size="9" fill="#94a3b8">obj</text>
    <text x="1290" y="514" text-anchor="middle" font-size="9" fill="#64748b">3 drivers · 6 stops</text>

    <rect x="1340" y="430" width="80" height="100" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="1380" y="450" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">Most direct</text>
    <text x="1380" y="478" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">274</text>
    <text x="1380" y="494" text-anchor="middle" font-size="9" fill="#94a3b8">obj</text>
    <text x="1380" y="514" text-anchor="middle" font-size="9" fill="#64748b">3 drivers · 11 stops</text>
  </g>

  <!-- Lock button -->
  <rect x="1160" y="556" width="260" height="36" rx="8" fill="#ffffff" stroke="#0f172a" stroke-width="1.5"/>
  <text x="1290" y="578" text-anchor="middle" font-size="12" font-weight="500" fill="#0f172a">🔒 Lock balanced solution</text>

  <!-- Solution legend / breakdown -->
  <text x="1160" y="628" font-size="12" font-weight="600" fill="#0f172a" letter-spacing="0.05em">OBJECTIVE BREAKDOWN</text>
  <g font-size="11" fill="#475569">
    <text x="1160" y="654">drive</text>
    <text x="1420" y="654" text-anchor="end" font-family="ui-monospace, monospace" fill="#0f172a">231.4</text>
    <text x="1160" y="676">stops</text>
    <text x="1420" y="676" text-anchor="end" font-family="ui-monospace, monospace" fill="#0f172a">8.0</text>
    <text x="1160" y="698">walk + PT</text>
    <text x="1420" y="698" text-anchor="end" font-family="ui-monospace, monospace" fill="#0f172a">12.3</text>
    <text x="1160" y="720">spread</text>
    <text x="1420" y="720" text-anchor="end" font-family="ui-monospace, monospace" fill="#0f172a">22.7</text>
    <text x="1160" y="742">fairness</text>
    <text x="1420" y="742" text-anchor="end" font-family="ui-monospace, monospace" fill="#0f172a">23.6</text>
  </g>

  <!-- What-if open -->
  <rect x="1160" y="770" width="260" height="36" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="1290" y="792" text-anchor="middle" font-size="12" fill="#475569">What if… open modal</text>

  <!-- Annotation -->
  <text x="252" y="876" font-size="11" fill="#64748b">Mockup — see docs/screenshots/README.md.  Real screenshots blocked on frontend↔API contract drift (known issue).</text>
</svg>
