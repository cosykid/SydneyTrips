<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="map4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#cfe6ff"/>
      <stop offset="1" stop-color="#e7f5e7"/>
    </linearGradient>
    <marker id="arr4" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
  </defs>

  <rect width="1440" height="900" fill="#f8fafc"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="240" height="900" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="32" y="48" font-size="18" font-weight="600" fill="#0f172a">SydneyTrips</text>
  <text x="46" y="98" font-size="14" fill="#475569">▤ Trips</text>
  <text x="46" y="138" font-size="14" fill="#475569">＋ Create trip</text>

  <!-- Header strip -->
  <rect x="240" y="0" width="1200" height="64" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="272" y="34" font-size="16" font-weight="600" fill="#0f172a">Driver view · Alex (Bondi)</text>
  <text x="272" y="52" font-size="12" fill="#64748b">Group trip to Palm Beach · departs Sun 24 May 09:00</text>

  <!-- Live connection badge -->
  <rect x="1180" y="20" width="240" height="28" rx="14" fill="#dcfce7" stroke="#86efac"/>
  <circle cx="1198" cy="34" r="5" fill="#16a34a"/>
  <text x="1212" y="38" font-size="11" font-weight="500" fill="#166534">SignalR connected · /hubs/trip</text>

  <!-- Map area -->
  <rect x="240" y="64" width="800" height="836" fill="url(#map4)"/>

  <!-- Sydney hint shape -->
  <path d="M 240 700 Q 380 640 540 680 T 800 640 T 1040 540 L 1040 900 L 240 900 Z" fill="#dceedb" opacity="0.6"/>

  <!-- Current driver position with heading -->
  <circle cx="540" cy="720" r="16" fill="#2563eb" stroke="#ffffff" stroke-width="3"/>
  <path d="M 540 720 L 560 700 L 552 720 Z" fill="#2563eb"/>
  <text x="540" y="725" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">▲</text>

  <!-- Route from current position through 3 stops to destination -->
  <path d="M 540 720 L 660 660 L 760 580 L 860 460 L 940 240" stroke="#2563eb" stroke-width="4" fill="none" opacity="0.85" stroke-linecap="round" marker-end="url(#arr4)"/>

  <!-- Stop 1: next pickup (highlighted) -->
  <circle cx="660" cy="660" r="14" fill="#fde68a" stroke="#f59e0b" stroke-width="3"/>
  <text x="660" y="664" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">1</text>
  <rect x="610" y="690" width="180" height="44" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <text x="700" y="710" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">Eli — 4 min</text>
  <text x="700" y="726" text-anchor="middle" font-size="10" fill="#64748b">Coogee Beach Park</text>

  <!-- Stop 2 -->
  <circle cx="760" cy="580" r="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2.5"/>
  <text x="760" y="584" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">2</text>

  <!-- Stop 3 -->
  <circle cx="860" cy="460" r="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2.5"/>
  <text x="860" y="464" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">3</text>

  <!-- Destination -->
  <circle cx="940" cy="240" r="16" fill="#dc2626" stroke="#ffffff" stroke-width="3"/>
  <text x="940" y="245" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">⚐</text>
  <rect x="870" y="270" width="140" height="32" rx="6" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="940" y="290" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">Palm Beach NSW</text>

  <!-- ETA hud -->
  <rect x="260" y="80" width="260" height="100" rx="12" fill="#0f172a"/>
  <text x="280" y="110" font-size="11" font-weight="500" fill="#cbd5e1" letter-spacing="0.06em">NEXT PICKUP</text>
  <text x="280" y="142" font-size="22" font-weight="700" fill="#ffffff">Eli (Coogee)</text>
  <text x="280" y="166" font-size="13" fill="#94a3b8">4 minutes · 1.8 km · turn right</text>

  <!-- Side panel (manifest) -->
  <rect x="1040" y="64" width="400" height="836" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="1064" y="100" font-size="15" font-weight="600" fill="#0f172a">Manifest</text>
  <text x="1064" y="120" font-size="12" fill="#64748b">3 pickups · 4 seats · 26 min total drive</text>

  <!-- Stop cards -->
  <g>
    <!-- Stop 1 (next) -->
    <rect x="1064" y="148" width="356" height="92" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
    <rect x="1080" y="166" width="24" height="24" rx="12" fill="#f59e0b"/>
    <text x="1092" y="184" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">1</text>
    <text x="1116" y="170" font-size="13" font-weight="600" fill="#0f172a">Eli</text>
    <text x="1116" y="186" font-size="11" fill="#64748b">Coogee Beach Park</text>
    <text x="1116" y="208" font-size="11" fill="#475569">ETA  </text>
    <text x="1152" y="208" font-size="11" font-weight="600" fill="#0f172a">09:08</text>
    <text x="1116" y="224" font-size="11" fill="#475569">walk  </text>
    <text x="1152" y="224" font-size="11" font-weight="500" fill="#0f172a">3 min from home</text>
    <text x="1404" y="170" text-anchor="end" font-size="11" font-weight="600" fill="#f59e0b">NEXT</text>

    <!-- Stop 2 -->
    <rect x="1064" y="252" width="356" height="80" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="1080" y="270" width="24" height="24" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="1092" y="288" text-anchor="middle" font-size="13" font-weight="600" fill="#64748b">2</text>
    <text x="1116" y="274" font-size="13" font-weight="600" fill="#0f172a">Fiona</text>
    <text x="1116" y="290" font-size="11" fill="#64748b">Manly Wharf  (ferry rendezvous)</text>
    <text x="1116" y="312" font-size="11" fill="#475569">ETA  </text>
    <text x="1152" y="312" font-size="11" font-weight="500" fill="#0f172a">09:18</text>

    <!-- Stop 3 -->
    <rect x="1064" y="344" width="356" height="80" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="1080" y="362" width="24" height="24" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="1092" y="380" text-anchor="middle" font-size="13" font-weight="600" fill="#64748b">3</text>
    <text x="1116" y="366" font-size="13" font-weight="600" fill="#0f172a">Gus</text>
    <text x="1116" y="382" font-size="11" fill="#64748b">Mosman Bay Ferry  (rendezvous)</text>
    <text x="1116" y="404" font-size="11" fill="#475569">ETA  </text>
    <text x="1152" y="404" font-size="11" font-weight="500" fill="#0f172a">09:32</text>

    <!-- Destination card -->
    <rect x="1064" y="436" width="356" height="72" rx="10" fill="#fef2f2" stroke="#fecaca"/>
    <rect x="1080" y="454" width="24" height="24" rx="12" fill="#dc2626"/>
    <text x="1092" y="472" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">⚐</text>
    <text x="1116" y="458" font-size="13" font-weight="600" fill="#0f172a">Palm Beach NSW</text>
    <text x="1116" y="474" font-size="11" fill="#64748b">Destination</text>
    <text x="1116" y="496" font-size="11" fill="#475569">arrive  </text>
    <text x="1160" y="496" font-size="11" font-weight="600" fill="#0f172a">10:05 ± 4 min</text>
  </g>

  <!-- Live events feed -->
  <text x="1064" y="556" font-size="12" font-weight="600" fill="#0f172a" letter-spacing="0.05em">LIVE EVENTS</text>
  <g font-size="11" fill="#475569" font-family="ui-monospace, 'SF Mono', monospace">
    <text x="1064" y="582">09:01:24  DriverDeparted</text>
    <text x="1064" y="600">09:02:11  PositionUpdate (lat=-33.8915)</text>
    <text x="1064" y="618">09:02:42  PassengerEtaUpdate → Eli</text>
    <text x="1064" y="636">09:03:14  PassengerEtaUpdate → Eli</text>
    <text x="1064" y="654">09:03:46  PassengerEtaUpdate → Eli</text>
  </g>

  <!-- Quick actions -->
  <text x="1064" y="700" font-size="12" font-weight="600" fill="#0f172a" letter-spacing="0.05em">ACTIONS</text>
  <rect x="1064" y="716" width="170" height="36" rx="8" fill="#0f172a"/>
  <text x="1149" y="738" text-anchor="middle" font-size="12" font-weight="500" fill="#ffffff">Mark pickup 1 done</text>
  <rect x="1250" y="716" width="170" height="36" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="1335" y="738" text-anchor="middle" font-size="12" fill="#475569">I'm running late</text>

  <!-- Annotation -->
  <text x="252" y="876" font-size="11" fill="#64748b">Mockup — see docs/screenshots/README.md.  The live data flow is implemented; the UI just needs to align with the trip-detail API shape.</text>
</svg>
